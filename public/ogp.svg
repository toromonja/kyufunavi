<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2440;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative elements -->
  <circle cx="1050" cy="80" r="200" fill="#f59e0b" opacity="0.05" />
  <circle cx="150" cy="550" r="250" fill="#f59e0b" opacity="0.04" />
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)" />

  <!-- Amber accent bar -->
  <rect x="80" y="200" width="80" height="6" rx="3" fill="url(#accent)" />

  <!-- Site name -->
  <text x="80" y="310" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="2">給付ナビ</text>

  <!-- English name -->
  <text x="84" y="358" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#f59e0b" letter-spacing="6">KYUFUNAVI</text>

  <!-- Tagline -->
  <text x="80" y="430" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="32" font-weight="400" fill="#cbd5e1">使える補助金・助成金を、もっと身近に。</text>

  <!-- Bottom decoration -->
  <rect x="0" y="600" width="1200" height="30" fill="#f59e0b" opacity="0.15" />
</svg>
